<!-- resources/views/default.antlers.html -->
<div class="max-w-2xl mx-auto px-4 py-12">
    
    <h1 class="text-3xl font-bold mb-6">{{ title }}</h1>
    
    <div class="prose mb-8">
        {{ content }}
    </div>

    <!-- Your Form Container -->
    {{ form:registration_form }}
        {{ if success }}
            <div class="p-4 bg-green-100 text-green-800 rounded">
                Thanks! Your registration was successful.
            </div>
        {{ else }}
            <!-- Loop through the fields you built in the CP -->
            {{ fields }}
                <div class="mb-5">
                    <label class="block text-sm font-semibold text-gray-200 mb-2" for="{{ handle }}">
                        {{ display }}
                    </label>
                    
                    <!-- Render the field but inject standard Tailwind styling -->
                    <div class="[&_input]:w-full [&_input]:p-3 [&_input]:rounded [&_input]:bg-gray-800 [&_input]:text-white [&_input]:border [&_input]:border-gray-700 [&_textarea]:w-full [&_textarea]:p-3 [&_textarea]:rounded [&_textarea]:bg-gray-800 [&_textarea]:text-white [&_textarea]:border [&_textarea]:border-gray-700">
                        {{ field }}
                    </div>
                    
                    {{ if error }}
                        <span class="text-red-500 text-sm mt-1 block">{{ error }}</span>
                    {{ /if }}
                </div>
            {{ /fields }}

            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
                Register
            </button>
        {{ /if }}
    {{ /form:registration_form }}

</div>
